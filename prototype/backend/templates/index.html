<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斯波索宾 和声分析系统 v26.0</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>斯波索宾 和声分析系统 v26.0</h1>
            <p class="subtitle">Riemann Harmonic Analysis & Voice Leading</p>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-group">
                <label>编辑模式：</label>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="FREE">自由模式</button>
                    <button class="mode-btn" data-mode="SOPRANO">高音题模式</button>
                    <button class="mode-btn" data-mode="COMPOSE">旋律写作模式</button>
                </div>
            </div>

            <div class="control-group">
                <label>全局调性：</label>
                <select id="keySelect">
                    <option>Loading...</option>
                </select>
            </div>
        </div>

        <!-- Melody Input -->
        <div class="melody-section">
            <div class="melody-header">
                <h3>旋律输入</h3>
            </div>
            
            <div class="piano-keyboard" id="pianoKeyboard">
                <!-- Piano keys will be generated by JavaScript -->
            </div>

            <div class="melody-input">
                <input type="text" id="melodyInput" placeholder="输入旋律序列 (e.g., C4 D4 E4 F4)" class="melody-entry">
                <div class="button-group">
                    <button id="undoBtn" class="btn btn-small">撤销</button>
                    <button id="clearBtn" class="btn btn-small">清空</button>
                    <button id="generateBtn" class="btn btn-primary">生成和声</button>
                </div>
            </div>
        </div>

        <!-- Output Score -->
        <div class="score-section">
            <h3>和声生成结果</h3>
            <div class="score-container">
                <canvas id="scoreCanvas" width="1000" height="300"></canvas>
            </div>
            
            <div class="playback-controls">
                <button id="playBtn" class="btn btn-primary">▶ 播放</button>
                <button id="stopBtn" class="btn btn-secondary">⏹ 停止</button>
                <span id="playbackStatus">就绪</span>
            </div>

            <audio id="audioPlayer" style="display:none;"></audio>
        </div>

        <!-- Result Display -->
        <div class="result-section">
            <h3>分析结果</h3>
            <div id="resultDisplay" class="result-display">
                <p>生成结果将显示在此处</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
